<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Croca Games</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="site-header">
        <h1 class="logo">Croca Games</h1>
        <button id="sairButton" class="btn btn--ghost">Sair</button>
    </header>
    <main>
        <section class="games-list">
            <h2 class="section-title">Choose Your Game</h2>
            <div class="game-grid">
                <div class="game" id="pacman">
                    <a class="game__link" href="pacman.html">
                        <img class="game__thumb" src="images/pacman.png" alt="Pac-Man">
                        <h3 class="game__title">Pac-Man</h3>
                    </a>
                </div>
                <div class="game" id="snake">
                    <a class="game__link" href="snake.html">
                        <img class="game__thumb" src="images/snake.png" alt="Snake">
                        <h3 class="game__title">Snake</h3>
                    </a>
                </div>
                <div class="game" id="tictactoe">
                    <a class="game__link" href="tictactoe.html">
                        <img class="game__thumb" src="images/tictactoe.png" alt="Tic-Tac-Toe">
                        <h3 class="game__title">Tic-Tac-Toe</h3>
                    </a>
                </div>
                <div class="game game--soon" id="spaceinvaders">
                    <img class="game__thumb" src="images/spaceinvaders.png" alt="Space Invaders">
                    <h3 class="game__title">Space Invaders</h3>
                    <span class="badge">Em breve</span>
                </div>
                <div class="game game--soon" id="asteroids">
                    <img class="game__thumb" src="images/asteroids.png" alt="Asteroids">
                    <h3 class="game__title">Asteroids</h3>
                    <span class="badge">Em breve</span>
                </div>
                <div class="game game--soon" id="pong">
                    <img class="game__thumb" src="images/pong.png" alt="Pong">
                    <h3 class="game__title">Pong</h3>
                    <span class="badge">Em breve</span>
                </div>
                <div class="game game--soon" id="breakout">
                    <img class="game__thumb" src="images/breakout.png" alt="Breakout">
                    <h3 class="game__title">Breakout</h3>
                    <span class="badge">Em breve</span>
                </div>
            </div>
        </section>
    </main>
    <footer class="site-footer">
        <p>&copy; 2024 Croca Games</p>
    </footer>
    <script src="js/logout.js"></script>
</body>
</html>
