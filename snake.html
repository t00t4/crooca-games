<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake - Crooca Games</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="site-header">
        <h1 class="logo logo--sm">Snake</h1>
    </header>
    <main>
        <canvas id="gameCanvas" width="400" height="440"></canvas>
        <p class="game-hint">Setas ou WASD move · P pausa</p>
        <div class="buttons">
            <button id="restartButton" class="btn btn--primary">Restart Game</button>
            <button id="backButton" class="btn btn--ghost">Back to Menu</button>
        </div>
    </main>
    <script src="js/snake.js"></script>
</body>
</html>
