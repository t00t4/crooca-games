<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Croca Games</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="auth-card">
        <h1 class="logo logo--sm">Login</h1>
        <form id="loginForm" class="form">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required>
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required>
            <button type="submit" class="btn btn--primary">Login</button>
        </form>
        <p class="form__hint">Don't have an account? <a href="signup.html">Sign up here</a>.</p>
    </div>
    <script src="js/auth.js"></script>
</body>
</html>
