name: crooca-games

services:
  crooca-games:
    build: .
    image: crooca-games:latest
    container_name: crooca-games
    restart: unless-stopped
    networks: [web]
    env_file: [.env]
    volumes:
      - crooca_games_data:/app/server/data
    mem_limit: 256m
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:3000/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

networks:
  web:
    external: true

volumes:
  crooca_games_data:
